name: Angular Dashboard CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dashboard:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tripper_dashboard_angular

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Angular App
        run: npm run build

      - name: Build Docker Image
        run: |
          docker build \
          -f ../DevOps/docker/Dockerfile.angular \
          -t tripper-dashboard ..